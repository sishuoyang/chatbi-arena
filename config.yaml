clickhouse:
  host: ${CLICKHOUSE_CLOUD_HOST}
  port: 8443
  secure: true
  database: ${CLICKHOUSE_CLOUD_DATABASE}
  admin_user: ${CLICKHOUSE_CLOUD_USER}
  admin_password: ${CLICKHOUSE_CLOUD_PASSWORD}
  ro_user: arena_ro
  ro_password: ${ARENA_RO_PASSWORD}
  query_limits:
    max_execution_time: 15
    max_result_rows: 100000
    max_memory_usage: 4000000000
    max_rows_to_read: 200000000

bedrock:
  # us-east-1: where the open-weight / non-Amazon models live (Qwen, DeepSeek,
  # OpenAI gpt-oss, Moonshot Kimi) alongside Claude. ClickHouse stays in Singapore.
  region: us-east-1
  inference:
    temperature: 0.0
    maxTokens: 2048          # headroom for reasoning models (DeepSeek-R1, gpt-oss, Kimi-thinking)

langfuse:
  host: ${LANGFUSE_BASE_URL}
  public_key: ${LANGFUSE_PUBLIC_KEY}
  secret_key: ${LANGFUSE_SECRET_KEY}

eval:
  float_dp: 4
  default_max_retries: 1
  run_tag: "core"

# Prices are illustrative us-east-1 on-demand $/1M tokens — confirm before
# trusting absolute cost numbers (relative ranking is robust).
models:
  # Anthropic Claude — small / medium / large (4.5 generation)
  - id: us.anthropic.claude-haiku-4-5-20251001-v1:0
    name: claude-haiku-4.5
    family: claude
    price_per_1m_in: 1.00
    price_per_1m_out: 5.00
  - id: us.anthropic.claude-sonnet-4-5-20250929-v1:0
    name: claude-sonnet-4.5
    family: claude
    price_per_1m_in: 3.00
    price_per_1m_out: 15.00
  - id: us.anthropic.claude-opus-4-5-20251101-v1:0
    name: claude-opus-4.5
    family: claude
    price_per_1m_in: 5.00
    price_per_1m_out: 25.00
  # Qwen (Alibaba) — small / medium / large
  - id: qwen.qwen3-32b-v1:0
    name: qwen3-32b
    family: qwen
    price_per_1m_in: 0.20
    price_per_1m_out: 0.60
  - id: qwen.qwen3-next-80b-a3b
    name: qwen3-80b
    family: qwen
    price_per_1m_in: 0.40
    price_per_1m_out: 1.20
  - id: qwen.qwen3-vl-235b-a22b
    name: qwen3-235b
    family: qwen
    price_per_1m_in: 0.80
    price_per_1m_out: 2.40
  # DeepSeek — only two available on Bedrock (no small variant)
  - id: deepseek.v3.2
    name: deepseek-v3.2
    family: deepseek
    price_per_1m_in: 0.28
    price_per_1m_out: 0.42
  - id: us.deepseek.r1-v1:0
    name: deepseek-r1
    family: deepseek
    price_per_1m_in: 0.55
    price_per_1m_out: 2.19
  # OpenAI open-weight gpt-oss (NOT hosted ChatGPT) — small / large
  - id: openai.gpt-oss-20b-1:0
    name: gpt-oss-20b
    family: openai
    price_per_1m_in: 0.05
    price_per_1m_out: 0.20
  - id: openai.gpt-oss-120b-1:0
    name: gpt-oss-120b
    family: openai
    price_per_1m_in: 0.15
    price_per_1m_out: 0.60
  # Moonshot Kimi — only two available, both large
  - id: moonshotai.kimi-k2.5
    name: kimi-k2.5
    family: kimi
    price_per_1m_in: 0.60
    price_per_1m_out: 2.50
  - id: moonshot.kimi-k2-thinking
    name: kimi-k2-thinking
    family: kimi
    price_per_1m_in: 0.60
    price_per_1m_out: 2.50

prompts:
  - name: P1_zeroshot
    self_correct: false
    desc: "Zero-shot — just the view schema + the question; return ClickHouse SQL. The baseline."
  - name: P2_fewshot
    self_correct: false
    k: 2
    desc: "Few-shot — P1 plus a couple of worked NL→SQL examples (held out from the test set)."
  - name: P3_dialect
    self_correct: false
    desc: "Dialect-aware — P1 plus a ClickHouse cheat-sheet (date funcs, uniqExact, argMax, INTERVAL…)."
  - name: P4_cot
    self_correct: false
    desc: "Chain-of-thought — reason step by step first, then give the final SQL in a fenced block."
  - name: P5_selfcorrect
    self_correct: true
    desc: "Self-correcting — P3 plus one retry that feeds the ClickHouse error back to the model."

grid:
  models: ["*"]
  prompts: ["*"]
